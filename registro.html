<body>
    <section class="mau">
         <h1>Registro de Usuario</h1>
        <fieldset>
            <legend>Datos personales</legend>
            <form action="" class="registro">
            <label for="Nombre">Nombre</label>
            <input id="Nombre" type="text" placeholder="Ej Miguel"> <br>
            <label for="apellido">Apellido</label>
            <input id="apellido" type="text" placeholder="Ej. Cortes"> <br>
            <label for="Cuidad">Ciudad</label>
            <input id="Cuidad" type="text" placeholder="Ej. popayán"> <br>
            <label for="Telefono">Telefono</label>
            <input id="Telefono" type="text" placeholder="Ej.31215413"> <br>
            <label for="Gmail">Gmail</label>
            <input id="Gmail" type="text" placeholder="Ej.juanperez@gmail.com"><br>
        </fieldset>
    <section class="cuenta">
        <fieldset >
            <legend>Datos de cuentas</legend>
            <label for="User">Nombre de Usuario</label>
            <input id="User" type="text"> <br>
            <label for="Pass">Contraseña</label>
            <input id="Pass" type="password">
        </fieldset>
    </section>
        <fieldset>
            <legend>Otros Datos</legend> <br>
            <label for="documento">Documento</label>
            <input id="documento" type="file"> <br>
            <label for="fecha">Fecha de nacimiento</label>
           <input  type="date">
        </fieldset>
        


    <input type="button" value="Guardar">

</form>
